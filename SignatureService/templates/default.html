<div class="org-email-signature" style="margin-top: 20px; padding: 16px; border-top: 3px solid #0078D4; font-family: 'Segoe UI', Arial, sans-serif;">
    <table cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td style="padding-right: 16px;">
                <p style="margin: 0; font-size: 16px; font-weight: bold; color: #0078D4;">{{DisplayName}}</p>
                <p style="margin: 2px 0; font-size: 13px; color: #555;">{{Title}}</p>
                <p style="margin: 2px 0; font-size: 13px; color: #555;">{{Department}}</p>
            </td>
            <td style="padding-left: 16px; border-left: 2px solid #0078D4;">
                <p style="margin: 0; font-size: 13px; color: #333;">{{Company}}</p>
                <p style="margin: 2px 0; font-size: 12px; color: #666;">📧 {{Email}}</p>
                <p style="margin: 2px 0; font-size: 12px; color: #666;">📞 {{Phone}}</p>
                <p style="margin: 2px 0; font-size: 12px; color: #666;">🌐 {{Website}}</p>
            </td>
        </tr>
    </table>
    <p style="margin: 10px 0 0 0; font-size: 10px; color: #999; line-height: 1.4;">
        This email and any attachments are intended solely for the named recipient(s).
        If you received this in error, please delete it and notify the sender immediately.
    </p>
</div>
